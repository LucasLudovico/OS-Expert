<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status do Serviço</title>
<link rel="stylesheet" href="../static/css/status-servico.css">
</head>
<body>

<div class="container">

    <h1 class="logo">OsExpert</h1>
    <p class="titulo">STATUS DE SERVIÇO</p>

    <div class="carro-card">
        <p class="saudacao">
            Olá, João! Seu veículo é o
        </p>

        <h2>Civic (ABC-1234)</h2>

        <span class="badge">
            EM MANUTENÇÃO
        </span>
    </div>

    <div class="timeline">

        <div class="evento concluido">
            <div class="ponto"></div>

            <div class="conteudo">
                <h4>Entrada & Checklist</h4>
                <p>Realizado em 14/05 às 09:00</p>
            </div>
        </div>

        <div class="evento concluido">
            <div class="ponto"></div>

            <div class="conteudo">
                <h4>Orçamento Aprovado</h4>
                <p>Confirmado via sistema</p>
            </div>
        </div>

        <div class="evento atual">
            <div class="ponto"></div>

            <div class="conteudo">
                <h4>Execução Técnica</h4>
                <p>Mecânico Ricardo trabalhando no motor</p>
            </div>
        </div>

        <div class="evento pendente">
            <div class="ponto"></div>

            <div class="conteudo">
                <h4>Teste de Rodagem & Limpeza</h4>
                <p>Aguardando início</p>
            </div>
        </div>

    </div>

    <button>
        FALAR COM A MECÂNICA
    </button>

</div>

</body>
</html>
