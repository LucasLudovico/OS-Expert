<!doctype html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS-Expert - Painel Administrativo</title>
    <link rel="stylesheet" href="../../static/css/atendente.css">
    <link rel="stylesheet" href="../../static/css/global.css">
</head>
<body>

<main class="card-container app-screen">
    <header class="home-header">
        <div>
            <span class="sub-greeting">SEJA BEM-VINDO</span>
            <h1 class="main-title">Menu Gestor</h1>
        </div>
        <div class="profile-badge" id="user-initial">L</div>
    </header>

    <nav class="menu-grid">
        <a href="cadastro.html" style="text-decoration: none; color: inherit;">
            <div class="menu-card">
                <div class="icon-box bg-icon-blue">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                </div>
                <div>
                    <h2>Cadastrar Clientes</h2>
                    <p>Vincular novo cliente e veículo</p>
                </div>
            </div>
        </a>

        <a href="nova-os.html" style="text-decoration: none; color: inherit;">
            <div class="menu-card">
                <div class="icon-box bg-icon-purple">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div>
                    <h2>Abrir Nova OS</h2>
                    <p>Gerar orçamento e delegar serviços</p>
                </div>
            </div>
        </a>

        <a href="historico.html" style="text-decoration: none; color: inherit;">
            <div class="menu-card">
                <div class="icon-box bg-icon-pink">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <div>
                    <h2>Histórico de Placas</h2>
                    <p>Buscar diagnóstico antigo do veículo</p>
                </div>
            </div>
        </a>

        <a href="status.html" style="text-decoration: none; color: inherit;">
            <div class="menu-card">
                <div class="icon-box bg-icon-green">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="15" x2="10" y2="15"></line><line x1="12" y1="15" x2="15" y2="15"></line><line x1="9" y1="11" x2="10" y2="11"></line><line x1="12" y1="11" x2="15" y2="11"></line></svg>
                </div>
                <div>
                    <h2>Status das OS</h2>
                    <p>Acompanhar andamento geral do pátio</p>
                </div>
            </div>
        </a>
    </nav>
</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const usuario = JSON.parse(sessionStorage.getItem('usuarioLogado'));
        if (usuario && usuario.nome) {
            document.getElementById('user-initial').innerText = usuario.nome.charAt(0).toUpperCase();
            if (usuario.cargo === "ATENDENTE") {
                document.querySelector('.main-title').innerText = "Menu Atendente";
            }
        }
    });
</script>
</body>
</html>
