<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS-Expert - Nova OS</title>
    <link rel="stylesheet" href="../../static/css/atendente.css">
    <link rel="stylesheet" href="../../static/css/global.css">
</head>
<body>
<main class="card-container app-screen">
    <a href="home.html" class="btn-back">←</a>
    <h1 class="view-title">Abrir Nova OS</h1>
    <hr class="divider">

    <form class="action-form">

        <div class="form-group">
            <label class="label-negrito">Selecionar Cliente</label>

            <select id="clienteSelect" class="cliente-select">
                <option value="">
                    Escolha um cliente
                </option>
            </select>
        </div>

        <div class="os-summary-box">

            <div class="cliente-info-row">
                <span class="info-label">Cliente</span>
                <span id="clienteInfo">-</span>
            </div>

            <div class="cliente-info-row">
                <span class="info-label">Veículo</span>
                <span id="veiculoInfo">-</span>
            </div>

            <div class="cliente-info-row">
                <span class="info-label">Placa</span>
                <span id="placaInfo">-</span>
            </div>

            <div class="cliente-info-row">
                <span class="info-label">Telefone</span>
                <span id="telefoneInfo">-</span>
            </div>

        </div>

        <div class="form-group">
            <label class="label-negrito">Selecionar Serviço</label>

            <select id="servicoSelect" class="cliente-select">
                <option value="">Escolha um serviço</option>
            </select>
        </div>

        <div class="form-group">
            <label class="label-negrito">
                Selecionar Mecânico
            </label>

            <select id="mecanicoSelect" class="cliente-select">
                <option value="">Escolha um mecânico</option>
            </select>
        </div>

        <div class="total-display campo-total">
            <span>Total: <strong class="total-destaque" id="totalOS">R$ 0,00</strong></span>
        </div>

        <button type="button" onclick="gerarOrcamento()" class="btn-orange-highlight">GERAR PDF ORÇAMENTO</button>
    </form>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
        integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="../../static/js/Atendente/nova-os.js"></script>
</body>
</html>
