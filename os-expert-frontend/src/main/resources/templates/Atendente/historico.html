<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS-Expert - Histórico de Placas</title>
    <link rel="stylesheet" href="../../static/css/atendente.css">
    <link rel="stylesheet" href="../../static/css/global.css">
</head>
<body>
<main class="card-container app-screen">
    <a href="home.html" class="btn-back">←</a>
    <h1 class="view-title titulo-historico">Histórico de Placas</h1>
    <hr class="divider linha-divisoria">

    <div class="search-bar-row container-busca">
        <input type="text" id="inputPlaca" class="input-placa" placeholder="ABC-1234" maxlength="8">
        <button type="button" class="btn-search-icon botao-busca">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
    </div>

    <div class="history-list lista-historico" id="listaHistorico">
    </div>
</main>

<script src="../../static/js/Atendente/historico.js"></script>
</body>
</html>
