<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OsExpert - Detalhes do Faturamento</title>
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/gestor.css">
</head>
<body>

<div class="card-container app-screen faturamento-container">

    <a href="home.html" class="back-navigation-trigger">
        <svg class="arrow-back-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
             stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
    </a>

    <h1 class="faturamento-main-title">Faturamento</h1>
    <p class="faturamento-subtitle">Análise simplificada do desempenho financeiro da oficina.</p>

    <div class="faturamento-block">
        <div class="block-header-title">ORIGEM DO FATURAMENTO</div>

        <div class="faturamento-row">
            <span class="row-label">Peças Vendidas:</span>
            <span class="row-value">R$ 3.100,00</span>
        </div>

        <div class="faturamento-row">
            <span class="row-label">Serviços (Mão de Obra):</span>
            <span class="row-value">R$ 1.750,00</span>
        </div>

        <div class="faturamento-row total-row">
            <span class="total-label">Total Acumulado:</span>
            <span class="total-value">R$ 4.850,00</span>
        </div>
    </div>

    <div class="faturamento-block">
        <div class="block-header-title">TÍQUETE MÉDIO P/ ORÇAMENTO</div>
        <div class="ticket-grand-value">R$ 404,16</div>
    </div>

    <div class="faturamento-block">
        <div class="meta-header-inline">
            <span class="block-header-title">META DO DIA</span>
            <span class="meta-percentage-badge">80%</span>
        </div>

        <div class="progress-bar-track">
            <div class="progress-bar-fill"></div>
        </div>

        <div class="meta-footer-labels">
            <span class="footer-left">R$ 4.850,00 REALIZADO</span>
            <span class="footer-right">META R$ 6.062,50</span>
        </div>
    </div>

</div>

</body>
</html>
