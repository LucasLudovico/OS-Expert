<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS-Expert - Menu Mecânico</title>
    <link rel="stylesheet" href="../../static/css/mecanico.css">
    <link rel="stylesheet" href="../../static/css/global.css">
</head>
<body>

<main class="card-container app-screen">
    <header class="home-header">
        <div>
            <span class="sub-greeting">OFICINA TÉCNICA</span>
            <h1 class="main-title">Menu Mecânico</h1>
        </div>
        <!-- Badge laranja -->
        <div class="profile-badge" id="user-initial"
             style="background-color: #ff7315; color: #000000; border: 2px solid #000000;">G
        </div>
    </header>

    <nav class="menu-grid">
        <!-- Opção 1: Minhas Tarefas -->
        <a href="tarefas.html" style="text-decoration: none; color: inherit;">
            <div class="menu-card">
                <div class="icon-box bg-icon-pink">
                    <!-- Ícone de Prancheta/Checklist (Minhas Tarefas) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        <path d="M9 14l2 2 4-4"></path>
                    </svg>
                </div>
                <div>
                    <h2>Minhas Tarefas</h2>
                    <p>Lista de OS ativas e pendentes</p>
                </div>
            </div>
        </a>

        <!-- Opção 2: Estoque & Peças -->
        <a href="estoque.html" style="text-decoration: none; color: inherit;">
            <div class="menu-card">
                <div class="icon-box bg-icon-blue">
                    <!-- Ícone de Caixa 3D (Estoque & Peças) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                        <line x1="12" y1="22.08" x2="12" y2="12"></line>
                    </svg>
                </div>
                <div>
                    <h2>Estoque & Peças</h2>
                    <p>Consultar disponibilidade de insumos</p>
                </div>
            </div>
        </a>

        <!-- Opção 3: Registrar Retirada -->
        <a href="retirada.html" style="text-decoration: none; color: inherit;">
            <div class="menu-card">
                <div class="icon-box bg-icon-purple">
                    <!-- Ícone de Setas Opostas (Registrar Retirada) -->
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 8 16 13"></polyline>
                        <line x1="21" y1="8" x2="9" y2="8"></line>
                        <polyline points="8 21 3 16 8 11"></polyline>
                        <line x1="3" y1="16" x2="15" y2="16"></line>
                    </svg>
                </div>
                <div>
                    <h2>Registrar Retirada</h2>
                    <p>Dar baixa em peças utilizadas no serviço</p>
                </div>
            </div>
        </a>

    </nav>
</main>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const usuario = JSON.parse(sessionStorage.getItem('usuarioLogado'));
        if (usuario && usuario.nome) {
            document.getElementById('user-initial').innerText = usuario.nome.charAt(0).toUpperCase();
        }
    });
</script>
</body>
</html>
