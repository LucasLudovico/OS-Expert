<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS-Expert - Estoque & Peças</title>
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/mecanico.css">
</head>
<body>

<main class="card-container app-screen">
    <a href="home.html" class="btn-back">&#8592;</a>

    <h1 class="view-title">Estoque & Peças</h1>
    <hr class="divider">

    <div class="search-container">
        <span class="search-icon-embed">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </span>
        <input type="text" id="inventorySearch" class="search-input-premium" placeholder="Buscar peça ou fluido...">
    </div>

    <div class="filter-row">
        <button class="tag-pill active" data-filter="todos">Todos</button>
        <button class="tag-pill" data-filter="freio">Freios</button>
        <button class="tag-pill" data-filter="oleo">Óleos/Fluidos</button>
        <button class="tag-pill btn-critical" data-filter="critico">⚠️ Crítico</button>
    </div>

    <section class="inventory-list">
        <p class="section-instruction">Carregando insumos do servidor...</p>
    </section>
</main>

<script src="../../static/js/Mecanico/estoque-pecas.js"></script>

</body>
</html>
