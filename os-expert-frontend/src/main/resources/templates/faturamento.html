<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faturamento</title>
<link rel="stylesheet" href="../static/css/faturamento.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <a href="#" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <h1>Faturamento</h1>

    <p class="descricao">
        Análise simplificada do desempenho financeiro da oficina.
    </p>

    <div class="card">

        <h3>ORIGEM DO FATURAMENTO</h3>

        <div class="linha">
            <span>Peças Vendidas:</span>
            <strong>R$ 3.100,00</strong>
        </div>

        <div class="linha">
            <span>Serviços (Mão de Obra):</span>
            <strong>R$ 1.750,00</strong>
        </div>

        <div class="linha total">
            <span>Total Acumulado:</span>
            <strong>R$ 4.850,00</strong>
        </div>

    </div>

    <div class="card ticket">

        <h3>TÍQUETE MÉDIO P/ ORÇAMENTO</h3>

        <h2>R$ 404,16</h2>

    </div>

    <div class="card">

        <div class="meta-topo">
            <h3>META DO DIA</h3>
            <span>80%</span>
        </div>

        <div class="barra">
            <div class="progresso"></div>
        </div>

        <div class="meta-info">
            <span>R$ 4.850,00 REALIZADO</span>
            <span>META R$ 6.062,50</span>
        </div>

    </div>

</div>

</body>
</html>
