<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS-Expert - Resumo do Serviço</title>
    <link rel="stylesheet" href="../../static/css/cliente.css">
    <link rel="stylesheet" href="../../static/css/global.css">
</head>
<body>

<main class="card-container app-screen">
    <a href="home.html" class="btn-back">&#8592;</a>

    <header class="summary-header">
        <h1 class="summary-title">Resumo do Serviço</h1>
    </header>

    <section class="review-items-card">
        <h2 class="items-section-title">ITENS DA REVISÃO</h2>

        <div class="item-row">
            <span class="item-name">Óleo Sintético 0W20</span>
            <span class="item-price">R$ 180,00</span>
        </div>

        <div class="item-row">
            <span class="item-name">Filtro de Óleo</span>
            <span class="item-price">R$ 45,00</span>
        </div>

        <div class="item-row">
            <span class="item-name">Mão de Obra</span>
            <span class="item-price">R$ 120,00</span>
        </div>

        <div class="items-divider"></div>

        <div class="item-row total-row">
            <span class="total-label">Total</span>
            <span class="total-price">R$ 345,00</span>
        </div>
    </section>

    <section class="delivery-prediction-card">
        <span class="prediction-label">Previsão de Entrega</span>
        <h3 class="prediction-time">Hoje, às 17:30</h3>
    </section>

    <footer class="summary-actions">
        <a href="itens-recomendados.html" class="btn-approve-extra">APROVAR ADICIONAIS</a>
        <a href="galeria-fotos.html" class="btn-view-gallery">VER GALERIA DE FOTOS</a>
    </footer>
</main>

<script src="../../static/js/Cliente/resumo-servico.js"></script>

</body>
</html>
