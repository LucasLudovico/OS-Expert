<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS-Expert - Pagamento</title>
    <link rel="stylesheet" href="../../static/css/cliente.css">
    <link rel="stylesheet" href="../../static/css/global.css">
</head>
<body>

<main class="card-container app-screen">
    <a href="home.html" class="btn-back">&#8592;</a>

    <header class="payment-header">
        <h1 class="payment-title" id="main-title">Aguardando Pagamento</h1>
    </header>

    <section class="value-card-highlight">
        <span class="value-label">VALOR CONSOLIDADO</span>
        <h2 class="value-amount">R$ 345,00</h2>
        <div class="badge-wrapper">
            <span class="badge-status-green" id="status-badge">AGUARDANDO PIX</span>
        </div>
    </section>

    <section class="qrcode-container" id="qr-section">
        <div class="qrcode-box">
            <img src="https://lnk.ua/qr/RQA7mFn9A" alt="QR Code Pix" class="qrcode-img"/>
        </div>
        <p class="qrcode-instruction">
            Escaneie o QR Code acima ou copie a chave abaixo para realizar o pagamento.
        </p>
    </section>

    <footer class="payment-actions">
        <button class="btn-copy-pix" id="btn-copy">COPIAR CÓDIGO PIX</button>
        <button class="btn-save-receipt" style="display: none;">SALVAR COMPROVANTE</button>
    </footer>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
        integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="../../static/js/Cliente/pagamento-os.js"></script>

</body>
</html>
