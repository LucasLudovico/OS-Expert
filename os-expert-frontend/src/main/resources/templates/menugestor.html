<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Gestor</title>
    <link rel="stylesheet" href="../static/css/menugestor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <div>
                <span>SEJA BEM-VINDO</span>
                <h1>Menu Gestor</h1>
            </div>

            <div class="perfil">
                L
            </div>
        </div>

        <div class="menu">

            <div class="card">
                <div class="icone">
                    <i class="fa-solid fa-user-plus"></i>
                </div>

                <div class="texto">
                    <h3>Cadastrar Cliente</h3>
                    <p>Vincular novo cliente e veículo</p>
                </div>
            </div>

            <div class="card">
                <div class="icone">
                    <i class="fa-regular fa-file-lines"></i>
                </div>

                <div class="texto">
                    <h3>Abrir Nova OS</h3>
                    <p>Gerar orçamento e delegar serviços</p>
                </div>
            </div>

            <div class="card">
                <div class="icone">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <div class="texto">
                    <h3>Histórico de Placas</h3>
                    <p>Buscar diagnóstico antigo do veículo</p>
                </div>
            </div>

            <div class="card">
                <div class="icone">
                    <i class="fa-regular fa-clipboard"></i>
                </div>

                <div class="texto">
                    <h3>Status das OS</h3>
                    <p>Acompanhar andamento geral do pátio</p>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
